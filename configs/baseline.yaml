paths:
  data_dir: data/processed
  model_dir: models
  output_dir: outputs

training:
  image_size: 224
  batch_size: 8
  epochs: 20
  learning_rate: 0.00001
  seed: 42
  num_workers: 0
  model: resnet50
  augment_train: true
  weight_decay: 0.0001
  label_smoothing: 0.08
  # Stop if validation loss does not improve for this many epochs (reduces overfitting to the train set).
  early_stopping_patience: 10
  # Inverse-frequency weights in the loss help when class counts differ (e.g. more emergency than non-emergency).
  use_class_weights: true
  # Default to CPU for reproducibility on lab machines; set to cuda or auto if you have a GPU.
  device: xpu
