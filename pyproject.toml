[tool.pytest.ini_options]
pythonpath = ["src"]
testpaths = ["tests"]
markers = [
    "integration: slow end-to-end tests (training + inference)",
]

[tool.ruff]
target-version = "py311"
line-length = 100

[tool.ruff.lint]
select = ["E4", "E7", "E9", "F", "I", "W"]
ignore = ["E501"]

[tool.ruff.format]
quote-style = "double"
